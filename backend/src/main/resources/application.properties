# Server
server.port=8081

# Load .env file from the root directory or the current directory
# Note: Spring Boot 2.4+ uses spring.config.import
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# H2 (development) - Only used if JPA entities are present
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# MongoDB Configuration
# It will use MONGO_URL from .env or default to localhost
spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017/smartcampus}

# Logging
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=INFO
