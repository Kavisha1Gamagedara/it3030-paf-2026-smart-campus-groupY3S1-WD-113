# Server
server.port=8081

# Load optional .env files (project root or backend folder)
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# H2 (development)
spring.datasource.url=jdbc:h2:mem:smartcampus;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.org.springframework=INFO

# OAuth2 (Google) - set these as environment variables or in your system/IDE run configuration
# Example (in your environment):
# GOOGLE_CLIENT_ID=...
# GOOGLE_CLIENT_SECRET=...

# Mongo (optional) - read from env var MONGO_URL (defaults to local MongoDB)
spring.data.mongodb.uri=${MONGO_URL:mongodb://localhost:27017/smartcampus}
